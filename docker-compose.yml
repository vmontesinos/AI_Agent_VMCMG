services:

  postgres:
    image: postgres:15
    container_name: db_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - backend
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  strava_sync:
    build:
      context: ./strava_app
      dockerfile: Dockerfile
    container_name: strava_sync
    restart: unless-stopped
    env_file:
      - ./strava_app/.env
    environment:
      - DB_HOST=db_postgres
      - DB_PORT=5432
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8080/sync || true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  n8n:
    image: n8nio/n8n:1.47.1
    container_name: n8n
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./pdfs:/home/node/.n8n-files
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      strava_sync:
        condition: service_started
    networks:
      - backend
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/conf.d/certs:ro
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - proxy

networks:
  backend:
  proxy:
