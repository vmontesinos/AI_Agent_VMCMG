# Cloudflare "Full" mode: connects to origin on HTTPS:443 with any certificate.
# Self-signed cert is enough — Cloudflare does not validate the chain in Full mode.

# Trust Cloudflare IPs to restore real visitor IP
geo $cloudflare_ip {
    default 0;
    103.21.244.0/22 1;
    103.22.200.0/22 1;
    103.31.4.0/22   1;
    104.16.0.0/13   1;
    104.24.0.0/14   1;
    108.162.192.0/18 1;
    131.0.72.0/22   1;
    141.101.64.0/18 1;
    162.158.0.0/15  1;
    172.64.0.0/13   1;
    188.114.96.0/20 1;
    190.93.240.0/20 1;
    197.234.240.0/22 1;
    198.41.128.0/17 1;
}

# Redirect plain HTTP to HTTPS (Cloudflare may probe port 80)
server {
    listen 80;
    server_name n0.vmcmg.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server — Cloudflare connects here
server {
    listen 443 ssl;
    server_name n0.vmcmg.com;

    ssl_certificate     /etc/nginx/conf.d/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/conf.d/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Restore real client IP from Cloudflare header
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    location / {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
